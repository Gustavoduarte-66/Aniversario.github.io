<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Para uma garota mais que especial ❤️</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

h1{
    text-align: center;
    margin-bottom: 30px;
    font-size: clamp(24px, 6vw, 40px);
    text-shadow: 0 0 20px #00ffff, 0 0 40px #0088ff, 0 0 60px #00aaff;
    animation: pulse 1.5s infinite;
    color: #00ffff;
    font-weight: bold;
    letter-spacing: 2px;
}

/* ANIMAÇÃO PULSAÇÃO AZUL */
@keyframes pulseAzul {
    0%, 100% {
        box-shadow: 0 0 15px #00aaff, 0 0 40px #00aaff;
    }
    50% {
        box-shadow: 0 0 25px #00aaff, 0 0 60px #00aaff, 0 0 80px #0088ff;
    }
}

/* BODY */
body{
    background:#050510;
    font-family:'Courier New', monospace;
    overflow:hidden;
    height:100vh;
    height:100dvh; /* Suporte para viewport dinâmica em mobile */
}

/* CANVAS MATRIX */
#matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* LOGIN NEON */
#login{
    position:fixed;
    z-index:10;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:90vw;
    max-width:550px;

    padding:clamp(20px, 5vw, 40px);

    border-radius:25px;

    background:rgba(10,10,20,.85);

    backdrop-filter:blur(10px);

    border:2px solid #00aaff;

    box-shadow:
    0 0 15px #00aaff,
    0 0 40px #00aaff;

    animation: pulseAzul 2s ease-in-out infinite;
}

/* FRASE */
.frase{
    text-align:center;
    color:#66ccff;
    font-size: clamp(14px, 3vw, 16px);
    margin: 20px 0;
}

/* INPUT */
input{
    width:100%;
    margin: clamp(15px, 3vw, 20px) 0;
    padding: clamp(8px, 2vw, 10px);
    background: rgba(0, 170, 255, 0.1);
    border: 1px solid #00aaff;
    border-radius: 5px;
    color: #00aaff;
    font-family: 'Courier New', monospace;
    font-size: clamp(14px, 4vw, 16px);
}

input::placeholder {
    color: rgba(0, 170, 255, 0.5);
}

input:focus {
    outline: none;
    box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.3);
    background: rgba(0, 170, 255, 0.15);
}

/* BOTÃO */
button{
    width:100%;
    padding: clamp(10px, 2vw, 12px);
    background: #00aaff;
    border: none;
    border-radius: 5px;
    color: #050510;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Courier New', monospace;
    font-size: clamp(14px, 4vw, 16px);
    -webkit-tap-highlight-color: transparent;
}

button:active {
    background: #0066ff;
    box-shadow: 0 0 20px #0066ff;
    transform: scale(0.98);
}

@media (hover: hover) {
    button:hover {
        background: #0088ff;
        box-shadow: 0 0 15px #0088ff;
    }
}

/* CONTAINER DA MENSAGEM */
.container{
    display:none;

    position:fixed;

    z-index:10;

    top:0;
    left:0;
    right:0;
    bottom:0;

    width:100%;
    height:100%;
    height:100dvh;

    background:rgba(255, 255, 255, 0.95);

    padding:clamp(20px, 5vw, 40px);

    border-radius:0;
    
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    
    border: none;
}

@media (min-width: 768px) {
    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90vw;
        max-width: 900px;
        height: auto;
        max-height: 80vh;
        border-radius: 25px;
        border: 2px solid #00aaff;
        box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
    }
}

/* BARRA DE SCROLL CUSTOMIZADA */
.container::-webkit-scrollbar {
    width: 12px;
}

.container::-webkit-scrollbar-track {
    background: rgba(0, 170, 255, 0.1);
    border-radius: 10px;
}

.container::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #00aaff, #0088ff);
    border-radius: 10px;
    box-shadow: 0 0 15px #00aaff;
}

.container::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #0088ff, #0066ff);
    box-shadow: 0 0 25px #00aaff;
}

/* Firefox */
.container {
    scrollbar-color: #00aaff rgba(0, 170, 255, 0.1);
    scrollbar-width: thin;
}

/* TEXTO */
#texto{
    white-space:pre-line;
    color: #00aaff;
    line-height: 1.6;
    font-size: clamp(12px, 3vw, 16px);
}

/* ASSINATURA */
.assinatura {
    margin-top: 30px;
    text-align: center;
    color: #00aaff;
    font-weight: bold;
    border-top: 1px solid #00aaff;
    padding-top: 20px;
    font-size: clamp(12px, 3vw, 16px);
}

/* CURSOR */
.cursor{
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* CORAÇÕES */
.coracao{
    position:fixed;
    top:-50px;
    z-index:2;
    font-size: clamp(20px, 8vw, 30px);
}

@keyframes cair{
    from{
        transform:translateY(-100px);
    }

    to{
        transform:translateY(120vh);
    }
}

/* RESPONSIVIDADE */
@media (max-width: 480px) {
    h1 {
        margin-bottom: 20px;
    }
    
    #login {
        width: 92vw;
        max-width: 100%;
    }
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->

<div id="login">

    <h1>SISTEMA PROTEGIDO</h1>

    <p class="frase">
        💙 Para uma garota muito especial 💙
    </p>

    <input
        type="password"
        id="senha"
        placeholder="Digite a senha"
        autocomplete="off">

    <button onclick="entrar()">

    const senha =
    document.getElementById("senha").value;

        document.querySelector(".container")
        .style.display = "block";

        // Scroll para o topo em mobile
        document.querySelector(".container").scrollTop = 0;

        escrever();

    }else{

        alert("Senha incorreta 💙");
    }
}

// Permitir entrar com ENTER
document.getElementById("senha").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {

});

let i = 0;

function escrever(){

    if(i < mensagem.length){

        document.getElementById("texto")
        .innerHTML += mensagem.charAt(i);

        i++;

        setTimeout(escrever,45);
    }
}

// MATRIX
// (cole aqui o código Matrix funcionando)

// CORAÇÕES
function criarCoracao(){

    const heart =
    document.createElement("div");

    heart.classList.add("coracao");

    heart.innerHTML = "💙";

    heart.style.left =
    Math.random()*100+"vw";

    heart.style.animation =
    "cair 6s linear";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(criarCoracao,300);

</html>
